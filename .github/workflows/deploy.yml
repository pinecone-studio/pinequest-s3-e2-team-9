name: CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            api:
              - 'apps/api/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'

  web:
    name: Validate web for deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint --workspace @pinequest/web

      - name: Build web
        run: npm run build --workspace @pinequest/web

  api:
    name: Validate API for deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.api == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace @pinequest/api --if-present

      - name: Build API
        run: npm run build --workspace @pinequest/api

  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
      - web
      - api
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
      ) &&
      needs.changes.result == 'success' &&
      (needs.web.result == 'success' || needs.web.result == 'skipped') &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true')
    environment: staging
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Trigger staging deployment webhook
        run: curl --fail --silent --show-error --location --request POST "$DEPLOY_WEBHOOK_URL"

  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - changes
      - web
      - api
    if: |
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
      ) &&
      needs.changes.result == 'success' &&
      (needs.web.result == 'success' || needs.web.result == 'skipped') &&
      (needs.api.result == 'success' || needs.api.result == 'skipped') &&
      (needs.changes.outputs.web == 'true' || needs.changes.outputs.api == 'true')
    environment: production
    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Trigger production deployment webhook
        run: curl --fail --silent --show-error --location --request POST "$DEPLOY_WEBHOOK_URL"
