name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CF_WEB_WORKER_NAME: pinequest-web

jobs:
  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          set -euo pipefail

          has_commit() {
            git cat-file -e "$1^{commit}" 2>/dev/null
          }

          before_sha="${{ github.event.before }}"
          if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            git ls-files > /tmp/changed-files.txt
          elif has_commit "$before_sha" && has_commit "${{ github.sha }}"; then
            git diff --name-only "$before_sha" "${{ github.sha }}" > /tmp/changed-files.txt
          else
            echo "Falling back because push SHAs are not both available locally."
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              git diff --name-only HEAD^ HEAD > /tmp/changed-files.txt
            else
              git ls-files > /tmp/changed-files.txt
            fi
          fi

          echo "Changed files:"
          cat /tmp/changed-files.txt || true

          web=false
          api=false

          if grep -Eq '^(apps/web/|packages/ui/|package.json|package-lock.json|tsconfig.base.json|\.github/workflows/(ci|cd)\.yaml$)' /tmp/changed-files.txt; then
            web=true
          fi

          if grep -Eq '^(apps/api/|package.json|package-lock.json|tsconfig.base.json|\.github/workflows/(ci|cd)\.yaml$)' /tmp/changed-files.txt; then
            api=true
          fi

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "api=$api" >> "$GITHUB_OUTPUT"

  web_verify:
    name: Frontend Verify
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint --workspace @pinequest/web

      - name: Type-check web
        run: npm run type-check --workspace @pinequest/web

      - name: Build web
        run: npm run build --workspace @pinequest/web

  api_verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check API
        run: npm run type-check --workspace @pinequest/api

      - name: Build API
        run: npm run build --workspace @pinequest/api

  deploy_web:
    name: Frontend Deploy
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - web_verify
    if: needs.detect_changes.outputs.web == 'true'

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping web deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Deploy web to Cloudflare Workers
        if: steps.cloudflare.outputs.available == 'true'
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_GRAPHQL_ENDPOINT: https://pinequest-api.b94889340.workers.dev/graphql
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set -euo pipefail
          trap 'rm -f .deploy.secrets.env' EXIT

          printf 'CLERK_SECRET_KEY=%s\n' "${CLERK_SECRET_KEY}" > .deploy.secrets.env

          npm run deploy -- \
            --keep-vars \
            --var "NEXT_PUBLIC_GRAPHQL_ENDPOINT:${NEXT_PUBLIC_GRAPHQL_ENDPOINT}" \
            --var "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" \
            --secrets-file .deploy.secrets.env

  deploy_api:
    name: Backend Deploy
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - api_verify
    if: needs.detect_changes.outputs.api == 'true'

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping API deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Deploy API worker
        if: steps.cloudflare.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy --env production
