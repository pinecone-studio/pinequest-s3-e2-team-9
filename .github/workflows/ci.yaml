name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CF_WEB_WORKER_NAME: pinequest-web

jobs:
  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          set -euo pipefail

          has_commit() {
            git cat-file -e "$1^{commit}" 2>/dev/null
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"

            if has_commit "$base_sha" && has_commit "$head_sha"; then
              git diff --name-only "$base_sha" "$head_sha" > /tmp/changed-files.txt
            else
              echo "Falling back because PR SHAs are not both available locally."
              base_ref="${{ github.event.pull_request.base.ref }}"
              git fetch --no-tags origin "$base_ref"
              merge_base="$(git merge-base HEAD "origin/$base_ref")"
              git diff --name-only "$merge_base" HEAD > /tmp/changed-files.txt
            fi
          else
            before_sha="${{ github.event.before }}"
            if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              git ls-files > /tmp/changed-files.txt
            elif has_commit "$before_sha" && has_commit "${{ github.sha }}"; then
              git diff --name-only "$before_sha" "${{ github.sha }}" > /tmp/changed-files.txt
            else
              echo "Falling back because push SHAs are not both available locally."
              if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
                git diff --name-only HEAD^ HEAD > /tmp/changed-files.txt
              else
                git ls-files > /tmp/changed-files.txt
              fi
            fi
          fi

          echo "Changed files:"
          cat /tmp/changed-files.txt || true

          web=false
          api=false

          if grep -Eq '^(apps/web/|packages/ui/|package.json|package-lock.json|tsconfig.base.json|\.github/workflows/(ci|cd)\.yaml$)' /tmp/changed-files.txt; then
            web=true
          fi

          if grep -Eq '^(apps/api/|package.json|package-lock.json|tsconfig.base.json|\.github/workflows/(ci|cd)\.yaml$)' /tmp/changed-files.txt; then
            api=true
          fi

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "api=$api" >> "$GITHUB_OUTPUT"

  web_verify:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint --workspace @pinequest/web

      - name: Type-check web
        run: npm run type-check --workspace @pinequest/web

      - name: Build web
        run: npm run build --workspace @pinequest/web

  api_verify:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: detect_changes
    if: needs.detect_changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check API
        run: npm run type-check --workspace @pinequest/api

      - name: Build API
        run: npm run build --workspace @pinequest/api

  web_preview:
    name: Frontend Preview
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - web_verify
      - api_preview
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name != 'main')) && needs.detect_changes.outputs.web == 'true'
    outputs:
      preview_url: ${{ steps.preview-url.outputs.url }}

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping web preview deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Compute web preview name
        if: steps.cloudflare.outputs.available == 'true'
        env:
          API_PREVIEW_URL: ${{ needs.api_preview.outputs.preview_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
          BASE_NAME: ${{ env.CF_WEB_WORKER_NAME }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -n "${PR_NUMBER}" ]; then
            suffix="pr-${PR_NUMBER}"
          else
            suffix="${REF_NAME}"
          fi

          sanitized="$(echo "${suffix}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"

          if [ -z "${sanitized}" ]; then
            sanitized="preview"
          fi

          max_suffix_length=$((54 - ${#BASE_NAME} - 1))

          if [ ${#sanitized} -gt ${max_suffix_length} ]; then
            short_sha="$(printf '%s' "${SHA}" | cut -c1-8)"
            trimmed_length=$((max_suffix_length - 9))
            sanitized="$(printf '%s' "${sanitized}" | cut -c1-${trimmed_length})-${short_sha}"
          fi

          echo "name=${BASE_NAME}-${sanitized}" >> "$GITHUB_OUTPUT"
        id: web-name

      - name: Compute web GraphQL endpoint
        if: steps.cloudflare.outputs.available == 'true'
        id: web-graphql
        env:
          DEFAULT_GRAPHQL_ENDPOINT: https://pinequest-api.b94889340.workers.dev/graphql
        run: |
          set -euo pipefail

          echo "endpoint=${DEFAULT_GRAPHQL_ENDPOINT}" >> "$GITHUB_OUTPUT"

      - name: Render web preview Wrangler config
        if: steps.cloudflare.outputs.available == 'true'
        env:
          TARGET_NAME: ${{ steps.web-name.outputs.name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const inputPath = "apps/web/wrangler.jsonc";
          const outputPath = "apps/web/wrangler.preview.jsonc";
          const config = JSON.parse(fs.readFileSync(inputPath, "utf8"));

          config.name = process.env.TARGET_NAME;
          if (Array.isArray(config.services)) {
            for (const service of config.services) {
              if (service && typeof service === "object") {
                service.service = process.env.TARGET_NAME;
              }
            }
          }

          fs.writeFileSync(outputPath, JSON.stringify(config, null, 2));
          NODE

      - name: Build web for Cloudflare Workers
        if: steps.cloudflare.outputs.available == 'true'
        working-directory: apps/web
        env:
          NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${{ steps.web-graphql.outputs.endpoint }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: npm run build:worker -- --config wrangler.preview.jsonc

      - name: Deploy web preview
        if: steps.cloudflare.outputs.available == 'true'
        id: preview-url
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_GRAPHQL_ENDPOINT: ${{ steps.web-graphql.outputs.endpoint }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set -euo pipefail
          trap 'rm -f apps/web/.deploy.secrets.env' EXIT

          printf 'CLERK_SECRET_KEY=%s\n' "${CLERK_SECRET_KEY}" > apps/web/.deploy.secrets.env

          log_file="$(mktemp)"
          (
            cd apps/web
            npx opennextjs-cloudflare deploy \
              --config wrangler.preview.jsonc \
              --keep-vars \
              --var "NEXT_PUBLIC_GRAPHQL_ENDPOINT:${NEXT_PUBLIC_GRAPHQL_ENDPOINT}" \
              --var "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}" \
              --secrets-file .deploy.secrets.env
          ) 2>&1 | tee "${log_file}"

          url="$(grep -Eo 'https://[A-Za-z0-9._/-]+\.workers\.dev' "${log_file}" | tail -n1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Publish web preview URL
        if: steps.cloudflare.outputs.available == 'true'
        env:
          URL: ${{ steps.preview-url.outputs.url }}
        run: |
          if [ -n "${URL}" ]; then
            echo "Web Preview URL: ${URL}" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=Web Preview URL::${URL}"
          fi

  api_preview:
    name: Backend Preview
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - api_verify
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name != 'main')) && needs.detect_changes.outputs.api == 'true'
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Check Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets are missing, skipping API preview deploy."
          fi

      - name: Checkout code
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.cloudflare.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare.outputs.available == 'true'
        run: npm ci

      - name: Compute API preview name
        if: steps.cloudflare.outputs.available == 'true'
        id: api-name
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ -n "${PR_NUMBER}" ]; then
            suffix="pr-${PR_NUMBER}"
          else
            suffix="${REF_NAME}"
          fi

          sanitized="$(echo "${suffix}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g')"

          if [ -z "${sanitized}" ]; then
            sanitized="preview"
          fi

          prefix="pinequest-api-"
          max_suffix_length=$((54 - ${#prefix}))

          if [ ${#sanitized} -gt ${max_suffix_length} ]; then
            short_sha="$(printf '%s' "${SHA}" | cut -c1-8)"
            trimmed_length=$((max_suffix_length - 9))
            sanitized="$(printf '%s' "${sanitized}" | cut -c1-${trimmed_length})-${short_sha}"
          fi

          echo "name=${prefix}${sanitized}" >> "$GITHUB_OUTPUT"

      - name: Render API preview Wrangler config
        if: steps.cloudflare.outputs.available == 'true'
        working-directory: apps/api
        env:
          TARGET_NAME: ${{ steps.api-name.outputs.name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const inputPath = "wrangler.toml";
          const outputPath = "wrangler.preview.toml";
          const source = fs.readFileSync(inputPath, "utf8");

          const rendered = source.replace(
            /^name = ".*"$/m,
            `name = "${process.env.TARGET_NAME}"`,
          );

          fs.writeFileSync(outputPath, rendered);
          NODE

      - name: Apply remote D1 migrations
        if: steps.cloudflare.outputs.available == 'true'
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply DB --remote --config wrangler.preview.toml

      - name: Deploy API preview
        if: steps.cloudflare.outputs.available == 'true'
        id: deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          set -euo pipefail
          trap 'rm -f .deploy.secrets.env' EXIT

          printf 'CLERK_SECRET_KEY=%s\n' "${CLERK_SECRET_KEY}" > .deploy.secrets.env

          log_file="$(mktemp)"
          npx wrangler deploy \
            --config wrangler.preview.toml \
            --keep-vars \
            --secrets-file .deploy.secrets.env 2>&1 | tee "${log_file}"

          url="$(grep -Eo 'https://[A-Za-z0-9._/-]+\.workers\.dev' "${log_file}" | tail -n1)"
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Publish API preview URL
        if: steps.cloudflare.outputs.available == 'true'
        env:
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          if [ -n "${URL}" ]; then
            echo "API Preview URL: ${URL}" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=API Preview URL::${URL}"
          fi

  preview_comment:
    name: Preview Comment
    runs-on: ubuntu-latest
    needs:
      - detect_changes
      - web_preview
      - api_preview
    if: github.event_name == 'pull_request' && always() && (needs.web_preview.result != 'skipped' || needs.api_preview.result != 'skipped')
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Comment PR with preview URLs
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- pinequest-preview -->";
            const webUrl = `${{ needs.web_preview.outputs.preview_url }}`.trim();
            const apiUrl = `${{ needs.api_preview.outputs.preview_url }}`.trim();
            const branch = "${{ github.head_ref }}";
            const sha = "${{ github.sha }}".slice(0, 7);

            const rows = [];
            if (webUrl) rows.push(`| Web Preview URL | ${webUrl} |`);
            if (apiUrl) rows.push(`| API Preview URL | ${apiUrl} |`);
            rows.push(`| Branch | \`${branch}\` |`);
            rows.push(`| Commit | \`${sha}\` |`);

            const body = [
              marker,
              "## Preview Deploy",
              "",
              "| Field | Value |",
              "|---|---|",
              ...rows,
            ].join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
