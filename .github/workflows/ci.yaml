name: CI - Verify and Preview

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CF_PAGES_PROJECT_NAME: ${{ github.event.repository.name }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Run tests
        run: npm test --if-present

      - name: Build app
        run: npm run build

      - name: Resolve build artifact path
        run: |
          set -euo pipefail

          for dir in apps/web/.vercel/output/static .vercel/output/static apps/web/.next .next apps/web/out out; do
            if [ -d "$dir" ]; then
              echo "BUILD_ARTIFACT_DIR=$dir" >> "$GITHUB_ENV"
              echo "Resolved artifact directory: $dir"
              exit 0
            fi
          done

          echo "::warning::No build artifact directory found to upload."

      - name: Upload build artifact
        if: ${{ env.BUILD_ARTIFACT_DIR != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ${{ env.BUILD_ARTIFACT_DIR }}
          retention-days: 1

  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ github.event_name == 'pull_request' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Resolve deploy target
        run: |
          set -euo pipefail

          normalize() {
            local value="$1"
            value="$(printf '%s' "$value" | tr '[:upper:]' '[:lower:]')"
            value="$(printf '%s' "$value" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            value="${value:0:58}"
            value="$(printf '%s' "$value" | sed -E 's/^-+//; s/-+$//')"
            printf '%s' "$value"
          }

          is_valid() {
            [[ "$1" =~ ^[a-z0-9]([a-z0-9-]{0,56}[a-z0-9])?$ ]]
          }

          candidate="$(normalize "${CF_PAGES_PROJECT_NAME:-${GITHUB_REPOSITORY##*/}}")"
          if ! is_valid "$candidate"; then
            echo "::error::Failed to derive a valid Cloudflare Pages project name."
            exit 1
          fi

          echo "DEPLOY_PROJECT_NAME=$candidate" >> "$GITHUB_ENV"

      - name: Resolve Pages output directory
        run: |
          set -euo pipefail

          for dir in apps/web/.vercel/output/static .vercel/output/static apps/web/out out; do
            if [ -d "$dir" ]; then
              echo "PAGES_OUTPUT_DIR=$dir" >> "$GITHUB_ENV"
              echo "Resolved Pages output directory: $dir"
              exit 0
            fi
          done

          echo "::error::Could not find a Cloudflare Pages output directory."
          echo "::error::Expected one of: apps/web/.vercel/output/static, .vercel/output/static, apps/web/out, out"
          exit 1

      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project="${DEPLOY_PROJECT_NAME}"
          api_base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          compat_date="$(date -u +%F)"

          status="$(curl -sS -o /tmp/cf-project-check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${api_base}/${project}")"

          if [ "${status}" != "200" ] || ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' /tmp/cf-project-check.json; then
            create_response="$(curl -sS -X POST "${api_base}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"name\":\"${project}\",\"production_branch\":\"main\",\"deployment_configs\":{\"preview\":{\"compatibility_date\":\"${compat_date}\",\"compatibility_flags\":[\"nodejs_compat\"]},\"production\":{\"compatibility_date\":\"${compat_date}\",\"compatibility_flags\":[\"nodejs_compat\"]}}}")"

            if ! echo "${create_response}" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true'; then
              echo "::error::Failed to create Pages project '${project}'."
              echo "${create_response}"
              exit 1
            fi
          fi

      - name: Deploy to Cloudflare Pages
        id: cloudflare-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.PAGES_OUTPUT_DIR }} --project-name=${{ env.DEPLOY_PROJECT_NAME }} --branch=${{ github.head_ref }} --commit-dirty=true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const deployUrl = "${{ steps.cloudflare-deploy.outputs.deployment-url }}";
            const branch = "${{ github.head_ref }}";
            const sha = "${{ github.sha }}".slice(0, 7);

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                "## Preview Deploy",
                "",
                `| Field | Value |`,
                `|---|---|`,
                `| Preview URL | ${deployUrl} |`,
                `| Branch | \`${branch}\` |`,
                `| Commit | \`${sha}\` |`
              ].join("\n")
            });
