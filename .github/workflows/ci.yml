name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'
            api:
              - 'apps/api/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.base.json'

  web:
    name: Web checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.web == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint --workspace @pinequest/web

      - name: Build web
        run: npm run build --workspace @pinequest/web

      - name: Test web
        run: npm run test --workspace @pinequest/web --if-present

  api:
    name: API checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.api == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace @pinequest/api --if-present

      - name: Build API
        run: npm run build --workspace @pinequest/api

      - name: Test API
        run: npm run test --workspace @pinequest/api --if-present
