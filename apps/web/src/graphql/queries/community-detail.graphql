query CommunityDetail($id: ID!) {
  community(id: $id) {
    id
    name
    description
    subject
    grade
    visibility
    viewerRole
    memberCount
    sharedBankCount
    sharedExamCount
    topContributors {
      role
      sharedBankCount
      sharedExamCount
      commentCount
      score
      user {
        id
        fullName
      }
    }
    members {
      id
      role
      joinedAt
      user {
        id
        fullName
      }
    }
    sharedBanks {
      id
      status
      copyCount
      ratingCount
      averageRating
      viewerRating
      createdAt
      sharedBy {
        id
        fullName
      }
      comments {
        id
        entityType
        entityId
        body
        createdAt
        author {
          id
          fullName
        }
      }
      bank {
        id
        title
        description
        grade
        subject
        topic
        visibility
        questionCount
        createdAt
        owner {
          id
          fullName
        }
      }
    }
    sharedExams {
      id
      examId
      title
      description
      subject
      grade
      className
      status
      durationMinutes
      questionCount
      attemptCount
      averageScorePercent
      ratingCount
      averageRating
      viewerRating
      createdAt
      sharedBy {
        id
        fullName
      }
      comments {
        id
        entityType
        entityId
        body
        createdAt
        author {
          id
          fullName
        }
      }
    }
  }
}
