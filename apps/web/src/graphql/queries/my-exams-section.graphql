query MyExamsSectionQuery {
  me {
    id
    classes {
      id
    }
  }
  exams {
    id
    mode
    isTemplate
    sourceExamId
    title
    status
    durationMinutes
    passingCriteriaType
    passingThreshold
    createdAt
    scheduledFor
    startedAt
    endsAt
    createdBy {
      id
    }
    class {
      id
      name
      subject
      grade
      studentCount
    }
    questions {
      id
      points
      order
    }
    attempts {
      id
      status
      totalScore
    }
  }
}
