query MyExamsQuery {
  me {
    id
    classes {
      id
    }
  }
  exams {
    id
    mode
    isTemplate
    sourceExamId
    title
    status
    durationMinutes
    passingCriteriaType
    passingThreshold
    createdAt
    startedAt
    endsAt
    createdBy {
      id
    }
    class {
      id
      name
      subject
      grade
      students {
        id
        fullName
      }
    }
    questions {
      id
      points
      order
      question {
        id
        title
        prompt
        tags
        type
        options
        correctAnswer
        bank {
          id
          topic
        }
      }
    }
    attempts {
      id
      status
      autoScore
      manualScore
      totalScore
      startedAt
      submittedAt
      student {
        id
        fullName
      }
      answers {
        id
        value
        autoScore
        manualScore
        feedback
        createdAt
        question {
          id
          title
          prompt
          tags
          type
        }
      }
    }
  }
}
