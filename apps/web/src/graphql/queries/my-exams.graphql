query MyExamsQuery {
  me {
    id
  }
  exams {
    id
    isTemplate
    sourceExamId
    title
    status
    durationMinutes
    createdAt
    createdBy {
      id
    }
    class {
      id
      name
      subject
      grade
      students {
        id
        fullName
      }
    }
    questions {
      id
      points
      order
      question {
        id
        title
        prompt
        type
        options
        correctAnswer
      }
    }
    attempts {
      id
      status
      totalScore
      startedAt
      submittedAt
      student {
        id
        fullName
      }
    }
  }
}
