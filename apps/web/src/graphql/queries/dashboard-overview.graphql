query DashboardOverview {
  dashboardOverview {
    teacherName
    summary {
      pendingReviewCount
      draftExamCount
      ongoingExamCount
      scheduledExamCount
    }
    upcomingExams {
      id
      title
      scheduledFor
      questionCount
      status
    }
    recentResults {
      id
      title
      passCount
      failCount
      progressPercent
      averageScorePercent
    }
  }
}
