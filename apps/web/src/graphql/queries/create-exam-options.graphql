query CreateExamOptions {
  me {
    id
  }
  classes {
    id
    name
    subject
    grade
  }
  questionBanks {
    id
    title
    subject
    grade
    topic
  }
  questions {
    id
    title
    prompt
    type
    difficulty
    shareScope
    requiresAccessRequest
    createdAt
    options
    correctAnswer
    tags
    createdBy {
      id
      fullName
    }
    bank {
      id
      title
      subject
      grade
      topic
      owner {
        id
      }
    }
  }
}
