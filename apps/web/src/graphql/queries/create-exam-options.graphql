query CreateExamOptions {
  me {
    id
  }
  classes {
    id
    name
  }
  questionBanks {
    id
    title
    subject
    grade
    topic
  }
  questions {
    id
    title
    prompt
    type
    difficulty
    options
    correctAnswer
    tags
    bank {
      id
      title
      subject
      grade
      topic
    }
  }
}
