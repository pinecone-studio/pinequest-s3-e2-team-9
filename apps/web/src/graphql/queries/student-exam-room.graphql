query StudentExamRoom($id: ID!) {
  me {
    id
    fullName
  }
  exam(id: $id) {
    id
    title
    description
    status
    durationMinutes
    startedAt
    endsAt
    scheduledFor
    shuffleQuestions
    shuffleAnswers
    passingCriteriaType
    passingThreshold
    createdAt
    class {
      id
      name
      subject
      grade
      teacher {
        id
        fullName
      }
    }
    questions {
      id
      order
      points
      question {
        id
        title
        prompt
        type
        options
      }
    }
  }
  attempts {
    id
    status
    totalScore
    generationSeed
    startedAt
    submittedAt
    exam {
      id
    }
    answers {
      id
      value
      autoScore
      manualScore
      feedback
      question {
        id
      }
    }
  }
}
