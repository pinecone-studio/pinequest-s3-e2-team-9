query ClassDetail($id: ID!) {
  class(id: $id) {
    id
    name
    description
    subject
    grade
    studentCount
    assignedExamCount
    upcomingExamCount
    completedExamCount
    averageScore
    teacher {
      id
      fullName
    }
    studentInsights {
      status
      lastActiveAt
      averageScore
      suspiciousEventCount
      integrityRisk
      lastIntegrityEventAt
      integritySignals {
        type
        severity
        count
      }
      integrityEvents {
        id
        type
        severity
        details
        createdAt
      }
      student {
        id
        fullName
        email
      }
    }
    examInsights {
      submittedCount
      totalStudents
      progressPercent
      averageScore
      questionCount
      exam {
        id
        title
        durationMinutes
        status
      }
    }
  }
}
