    id
    fullName
    classes {
      id
      name
      subject
      grade
      teacher {
        id
        fullName
      }
    }
  }
  exams {
    id
    title
    mode
    status
    durationMinutes
    startedAt
    endsAt
    scheduledFor
    createdAt
    class {
      id
      name
      subject
      grade
      teacher {
        id
        fullName
      }
    }
    questions {
      id
      points
    }
