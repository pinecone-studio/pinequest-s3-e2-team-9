mutation CreateExam(
  $classId: ID!
  $title: String!
  $description: String
  $mode: ExamMode!
  $durationMinutes: Int!
  $scheduledFor: String
) {
  createExam(
    classId: $classId
    title: $title
    description: $description
    mode: $mode
    durationMinutes: $durationMinutes
    scheduledFor: $scheduledFor
  ) {
    id
    title
    status
    mode
    durationMinutes
    scheduledFor
    createdAt
    class {
      id
      name
    }
  }
}
