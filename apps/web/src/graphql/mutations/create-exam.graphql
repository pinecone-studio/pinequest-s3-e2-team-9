mutation CreateExam(
  $classId: ID!
  $title: String!
  $description: String
  $mode: ExamMode!
  $durationMinutes: Int!
  $scheduledFor: String
  $shuffleQuestions: Boolean!
  $shuffleAnswers: Boolean!
  $passingCriteriaType: PassingCriteriaType!
  $passingThreshold: Int!
) {
  createExam(
    classId: $classId
    title: $title
    description: $description
    mode: $mode
    durationMinutes: $durationMinutes
    scheduledFor: $scheduledFor
    shuffleQuestions: $shuffleQuestions
    shuffleAnswers: $shuffleAnswers
    passingCriteriaType: $passingCriteriaType
    passingThreshold: $passingThreshold
  ) {
    id
    title
    status
    mode
    durationMinutes
    scheduledFor
    shuffleQuestions
    shuffleAnswers
    passingCriteriaType
    passingThreshold
    createdAt
    class {
      id
      name
    }
  }
}
