mutation CreateExamImportJobMutation(
  $fileName: String!
  $fileSizeBytes: Int!
  $extractedText: String!
  $sourceType: ExamImportSourceType!
  $storageKey: String
  $extractionJson: String
  $classifierJson: String
) {
  createExamImportJob(
    fileName: $fileName
    fileSizeBytes: $fileSizeBytes
    extractedText: $extractedText
    sourceType: $sourceType
    storageKey: $storageKey
    extractionJson: $extractionJson
    classifierJson: $classifierJson
  ) {
    id
    storageKey
    fileName
    fileSizeBytes
    sourceType
    status
    title
    extractionJson
    classifierJson
    errorMessage
    totalQuestions
    reviewCount
    createdAt
    updatedAt
    questions {
      id
      order
      type
      title
      prompt
      options
      answers
      score
      difficulty
      sourcePage
      sourceExcerpt
      sourceBlockId
      sourceBboxJson
      confidence
      needsReview
      createdAt
    }
  }
}
