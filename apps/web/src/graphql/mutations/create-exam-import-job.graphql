mutation CreateExamImportJobMutation(
  $fileName: String!
  $fileSizeBytes: Int!
  $extractedText: String!
  $storageKey: String
) {
  createExamImportJob(
    fileName: $fileName
    fileSizeBytes: $fileSizeBytes
    extractedText: $extractedText
    storageKey: $storageKey
  ) {
    id
    storageKey
    fileName
    fileSizeBytes
    sourceType
    status
    title
    errorMessage
    totalQuestions
    reviewCount
    createdAt
    updatedAt
    questions {
      id
      order
      type
      title
      prompt
      options
      answers
      score
      difficulty
      sourcePage
      confidence
      needsReview
      createdAt
    }
  }
}
